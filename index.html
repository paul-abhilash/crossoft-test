<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Management | Modern CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <!-- Top Navigation with Quick Search -->
    <nav class="bg-white border-b border-gray-200 px-6 py-3 flex flex-wrap justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-8 flex-1">
            <h1 class="text-xl font-bold text-blue-600 tracking-tight">CROSSTEL</h1>
            
            <!-- NEW: Quick Search Bar -->
            <div class="relative w-full max-w-md hidden md:block">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </span>
                <input type="text" 
                    placeholder="Search account #, name, or email..." 
                    class="w-full pl-10 pr-4 py-2 bg-gray-100 border border-transparent rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                >
                <!-- Optional: Search Keyboard Shortcut Hint -->
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                    <kbd class="hidden sm:inline-block px-1.5 py-0.5 text-[10px] font-semibold text-gray-400 bg-white border border-gray-300 rounded">CMD + K</kbd>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-6 text-gray-500">
            <div class="hidden lg:flex gap-6 text-sm font-medium">
                <a href="#" class="text-blue-600 border-b-2 border-blue-600 pb-4 -mb-4">Accounts</a>
                <a href="#" class="hover:text-blue-600 transition">Reports</a>
                <a href="#" class="hover:text-blue-600 transition">System</a>
            </div>
            <div class="h-6 w-px bg-gray-200 hidden lg:block"></div>
            <i class="fa-regular fa-bell cursor-pointer hover:text-gray-800"></i>
            <div class="w-8 h-8 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center font-bold text-xs cursor-pointer">JS</div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <!-- Header Actions -->
        <div class="flex flex-wrap justify-between items-end gap-4 mb-8">
            <div>
                <div class="flex items-center gap-2 text-xs text-gray-500 uppercase tracking-wider font-semibold mb-1">
                    <span>Account Details</span>
                    <span class="bg-green-100 text-green-700 px-2 py-0.5 rounded-full text-[10px]">Active</span>
                </div>
                <h2 class="text-3xl font-bold text-gray-800">John Smith <span class="text-gray-400 font-light ml-2">#999333999</span></h2>
            </div>
            <div class="flex gap-3">
                <button class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium hover:bg-gray-50 transition flex items-center gap-2">
                    <i class="fa-solid fa-clock-rotate-left"></i> History
                </button>
                <button class="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 shadow-md transition">Save Changes</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Column: Primary Info -->
            <div class="lg:col-span-2 space-y-6">
                
                <!-- Personal Info Card -->
                <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-2 text-gray-800">
                            <i class="fa-regular fa-user text-blue-500"></i>
                            <h3 class="font-bold">Personal Information</h3>
                        </div>
                        <button class="text-blue-600 text-xs font-bold hover:underline">Edit</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Email Address</label>
                            <input type="email" value="tt3045@gmail.com" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Date of Birth</label>
                            <input type="text" value="04-15-1952" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                        </div>
                        <div class="md:col-span-2 grid grid-cols-3 gap-4">
                             <div class="col-span-1">
                                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Title</label>
                                <select class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg">
                                    <option>Mr.</option>
                                    <option>Ms.</option>
                                    <option>Dr.</option>
                                </select>
                            </div>
                            <div class="col-span-2">
                                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Full Name</label>
                                <div class="flex gap-2">
                                    <input type="text" value="John" placeholder="First" class="w-1/2 p-2.5 bg-gray-50 border border-gray-200 rounded-lg">
                                    <input type="text" value="Smith" placeholder="Last" class="w-1/2 p-2.5 bg-gray-50 border border-gray-200 rounded-lg">
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Service Address Card -->
                <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <div class="flex items-center gap-2 mb-6 text-gray-800">
                        <i class="fa-solid fa-location-dot text-blue-500"></i>
                        <h3 class="font-bold">Service Address</h3>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div class="md:col-span-2">
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Street Address</label>
                            <input type="text" value="916 S BROAD ST" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Unit / Apt</label>
                            <input type="text" placeholder="--" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">City</label>
                            <input type="text" value="SCOTTSBORO" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">State</label>
                            <input type="text" value="AL" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg text-center font-bold">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Zip Code</label>
                            <input type="text" value="35768" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg">
                        </div>
                    </div>
                </section>
            </div>

            <!-- Right Column: Quick Stats -->
            <div class="space-y-6">
                <section class="bg-blue-600 p-6 rounded-2xl shadow-xl text-white">
                    <h3 class="text-sm font-semibold uppercase opacity-70 mb-6">Quick Summary</h3>
                    <div class="space-y-5">
                        <div class="flex justify-between items-center border-b border-blue-500 pb-3">
                            <span class="text-xs opacity-80">Account Type</span>
                            <span class="font-bold">Residential</span>
                        </div>
                        <div class="flex justify-between items-center border-b border-blue-500 pb-3">
                            <span class="text-xs opacity-80">Bill Cycle</span>
                            <span class="font-bold text-2xl">04</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-xs opacity-80">Market</span>
                            <span class="font-bold">Atlanta</span>
                        </div>
                    </div>
                    <div class="mt-8 space-y-3">
                        <button class="w-full py-3 bg-white text-blue-600 rounded-xl font-bold text-sm hover:bg-blue-50 transition shadow-lg">
                            Manage Billing
                        </button>
                        <button class="w-full py-3 bg-blue-700 text-white rounded-xl font-bold text-sm hover:bg-blue-800 transition">
                            View Services
                        </button>
                    </div>
                </section>

                <div class="bg-white p-5 rounded-xl border border-gray-100 text-center">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">System Info</p>
                    <p class="text-xs text-gray-500 mt-2">Time: America/New_York</p>
                    <p class="text-xs text-gray-400 mt-1">© 2024 Crosstel Inc.</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
